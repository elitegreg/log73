contests:
  - id: 'CQ-WW-CW'
    display_name: 'CQ World Wide DX Contest (CW)'
    allowed_bands: [160, 80, 40, 20, 15, 10]
    allowed_modes: ['CW']
    scoring:
      qso_points:
        category_band_param: 'CATEGORY-BAND'
        geography:
          country_field: 'DXCC_PREFIX'
          station_country_field: 'MY_DXCC_PREFIX'
          continent_field: 'CONT'
          station_continent_field: 'MY_CONT'
          same_country: 0
          different_country_north_america: 2
          different_country_same_continent: 1
          different_continent: 3
          unresolved: 0
      dupe_key: ['CALL', 'BAND']
      multipliers:
        - name: 'Zone'
          field: 'CQZ'
          key: ['CQZ', 'BAND']
        - name: 'Country'
          field: 'DXCC_PREFIX'
          key: ['DXCC_PREFIX', 'BAND']
          exclude_call_suffixes: ['/MM']
    log_params:
      - name: 'CQ_ZONE'
        label: 'CQ Zone'
        type: 'String:2'
        required: true
        regex: '^(?:[1-9]|[1-3][0-9]|40)$'
        help_text: 'CQ zone number for the station location (1-40).'
    exchange:
      - name: 'RST(s)'
        type: 'RST'
        adif: 'RST_SENT'
        default: 599
        is_sent: true
      - name: 'Zone(s)'
        type: 'String:2'
        adif: 'MY_CQ_ZONE'
        fixed: true
        source_param: 'CQ_ZONE'
        regex: '^(?:[1-9]|[1-3][0-9]|40)$'
        is_sent: true
      - name: 'RST(r)'
        type: 'RST'
        adif: 'RST_RCVD'
        default: 599
        is_sent: false
      - name: 'Zone'
        type: 'String:2'
        adif: 'CQZ'
        regex: '^(?:[1-9]|[1-3][0-9]|40)$'
        is_sent: false
    qso_columns: ['RST(r)', 'Zone', 'Mult', 'Pts', 'Op']
    qso_column_fields:
      Freq: 'FREQ'
      Mode: 'MODE'
      Call: 'CALL'
      Op: 'OPERATOR'
      'RST(s)': 'RST_SENT'
      'Zone(s)': 'MY_CQ_ZONE'
      'RST(r)': 'RST_RCVD'
      Zone: 'CQZ'
    cabrillo:
      fixed_fields:
        - name: 'CATEGORY-MODE'
          value: 'CW'
      log_fields:
        - name: 'CATEGORY-OPERATOR'
          label: 'Category Operator'
          type: 'String:16'
          widget: 'select'
          default: 'SINGLE-OP'
          valid_values: ['SINGLE-OP', 'MULTI-OP']
        - name: 'CATEGORY-ASSISTED'
          label: 'Category Assisted'
          type: 'String:16'
          widget: 'select'
          default: 'NON-ASSISTED'
          valid_values: ['ASSISTED', 'NON-ASSISTED']
        - name: 'CATEGORY-BAND'
          label: 'Category Band'
          type: 'String:8'
          widget: 'select'
          default: 'ALL'
          valid_values: ['ALL', '160M', '80M', '40M', '20M', '15M', '10M']
        - name: 'CATEGORY-POWER'
          label: 'Category Power'
          type: 'String:16'
          widget: 'select'
          default: 'LOW'
          valid_values: ['HIGH', 'LOW', 'QRP']
        - name: 'CATEGORY-TRANSMITTER'
          label: 'Category Transmitter'
          type: 'String:16'
          widget: 'select'
          default: 'ONE'
          valid_values: ['ONE', 'UNLIMITED']
        - name: 'CATEGORY-OVERLAY'
          label: 'Category Overlay'
          type: 'String:16'
          widget: 'select'
          required: false
          valid_values: ['CLASSIC', 'ROOKIE', 'YOUTH']
      export_fields:
        - name: 'LOCATION'
          label: 'Location'
          type: 'String:32'
          help_text: 'State, province, ARRL section, or DX.'
        - name: 'CLUB'
          label: 'Club'
          type: 'String:75'
          required: false
          preserve_case: true
        - name: 'EMAIL'
          label: 'Email'
          type: 'String:75'
          required: false
          regex: '^[^\s@]+@[^\s@]+\.[^\s@]+$'
          preserve_case: true
        - name: 'GRID-LOCATOR'
          label: 'Grid Locator'
          type: 'String:6'
          required: false
        - name: 'NAME'
          label: 'Name'
          type: 'String:75'
          preserve_case: true
        - name: 'ADDRESS'
          label: 'Address'
          type: 'String:45'
          widget: 'textarea'
          max_lines: 6
          required: false
          preserve_case: true
        - name: 'ADDRESS-CITY'
          label: 'Address City'
          type: 'String:45'
          required: false
          preserve_case: true
        - name: 'ADDRESS-STATE-PROVINCE'
          label: 'Address State/Province'
          type: 'String:45'
          required: false
          preserve_case: true
        - name: 'ADDRESS-POSTALCODE'
          label: 'Address Postal Code'
          type: 'String:16'
          required: false
          preserve_case: true
        - name: 'ADDRESS-COUNTRY'
          label: 'Address Country'
          type: 'String:45'
          required: false
          preserve_case: true
        - name: 'SOAPBOX'
          label: 'Soapbox'
          type: 'String:75'
          widget: 'textarea'
          required: false
          preserve_case: true
    metadata:
      source: 'https://cqww.com/rules.htm'
      notes: 'Countries use DXCC/WAE primary prefixes; received CQ zone is the logged exchange.'

  - id: 'CQ-WW-SSB'
    extends: 'CQ-WW-CW'
    display_name: 'CQ World Wide DX Contest (SSB)'
    allowed_modes: ['SSB']
    cabrillo:
      fixed_fields:
        - name: 'CATEGORY-MODE'
          value: 'SSB'
