    log_params:
      - name: 'County'
        label: 'County'
        type: 'String:4'
        required: true
        in_sets: ['Counties']
    exchange:
      - name: 'RST(s)'
        type: 'RST'
        adif: 'RST_SENT'
        default: 599
        is_sent: true
      - name: 'County'
        type: 'String:4'
        adif: 'STX_STRING'
        fixed: true
        source_param: 'County'
        is_sent: true
        in_sets: ['Counties']
      - name: 'RST(r)'
        type: 'RST'
        adif: 'RST_RCVD'
        default: 599
        is_sent: false
      - name: 'Exchange'
        type: 'String:4'
        adif: 'SRX_STRING'
        is_sent: false
        in_sets: ['Counties', 'States', 'DX']
    qso_columns:
      - 'RST(s)'
      - 'RST(r)'
      - 'Exchange'
      - 'Mult'
      - 'Pts'
      - 'Op'
    qso_column_fields:
      Freq: 'FREQ'
      Mode: 'MODE'
      Call: 'CALL'
      Op: 'OPERATOR'
      'RST(s)': 'RST_SENT'
      County: 'STX_STRING'
      'RST(r)': 'RST_RCVD'
      Exchange: 'SRX_STRING'

  - id: 'SC-QSO-PARTY'
    extends: 'SC-QSO-PARTY (In State)'
    display_name: 'SC QSO Party'
    scoring:
      qso_points:
        points: 2
    log_params:
      - name: 'State'
        label: 'State'
        type: 'String:4'
        required: true
        in_sets: ['States', 'DX']
    exchange:
      - name: 'RST(s)'
        type: 'RST'
        adif: 'RST_SENT'
        default: 599
        is_sent: true
      - name: 'State'
        type: 'String:4'
        adif: 'STX_STRING'
        fixed: true
        source_param: 'State'
        is_sent: true
        in_sets: ['States', 'DX']
      - name: 'RST(r)'
        type: 'RST'
        adif: 'RST_RCVD'
        default: 599
        is_sent: false
      - name: 'County'
        type: 'String:4'
        adif: 'SRX_STRING'
        is_sent: false
        in_sets: ['Counties']
    qso_columns:
      - 'RST(s)'
      - 'RST(r)'
      - 'County'
      - 'Mult'
      - 'Pts'
      - 'Op'
    qso_column_fields:
      Freq: 'FREQ'
      Mode: 'MODE'
      Call: 'CALL'
      Op: 'OPERATOR'
      'RST(s)': 'RST_SENT'
      State: 'STX_STRING'
      'RST(r)': 'RST_RCVD'
      County: 'SRX_STRING'
