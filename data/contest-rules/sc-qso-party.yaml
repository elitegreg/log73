contests:
  - id: 'SC-QSO-PARTY (In State)'
    display_name: 'SC QSO Party (In State)'
    allowed_bands: [160, 80, 40, 20, 15, 10, 6, 2]
    allowed_modes: ['SSB', 'FM', 'CW']
    scoring:
      qso_points:
        rules:
          - when:
              field: 'Exchange'
              in_set: 'Counties'
            points: 2
          - points: 4
      dupe_key:
        - 'CALL'
        - 'BAND'
        - 'MODE'
        - 'STX_STRING'
        - 'SRX_STRING'
      multipliers:
        - name: 'Exchange'
          field: 'SRX_STRING'
          key:
            - 'SRX_STRING'
            - 'STX_STRING'
            - 'BAND'
            - 'MODE'
          in_sets: ['Counties', 'States']
      bonus_points:
        - name: 'Bonus Station'
          field: 'CALL'
          key:
            - 'CALL'
            - 'BAND'
            - 'MODE'
            - 'STX_STRING'
          values:
            W4CAE: 350
            WW4SF: 250
            K4YTZ: 250
    cabrillo:
      fixed_fields:
        - name: 'CATEGORY-BAND'
          value: 'ALL'
      log_fields:
        - name: 'CATEGORY-MODE'
          label: 'Category Mode'
          type: 'String:16'
          widget: 'select'
          valid_values: ['CW', 'FM', 'SSB', 'MIXED']
        - name: 'CATEGORY-OPERATOR'
          label: 'Category Operator'
          type: 'String:16'
          widget: 'select'
          valid_values: ['SINGLE-OP', 'MULTI-OP', 'CHECKLOG']
        - name: 'CATEGORY-POWER'
          label: 'Category Power'
          type: 'String:16'
          widget: 'select'
          valid_values: ['HIGH', 'LOW', 'QRP']
        - name: 'CATEGORY-STATION'
          label: 'Category Station'
          type: 'String:16'
          widget: 'select'
          valid_values: ['FIXED', 'MOBILE', 'PORTABLE']
        - name: 'CATEGORY-TRANSMITTER'
          label: 'Category Transmitter'
          type: 'String:16'
          widget: 'select'
          valid_values: ['ONE', 'TWO', 'UNLIMITED']
      export_fields:
        - name: 'CLUB'
          label: 'Club'
          type: 'String:75'
          required: false
          preserve_case: true
        - name: 'EMAIL'
          label: 'Email'
          type: 'String:75'
          regex: '^[^\s@]+@[^\s@]+\.[^\s@]+$'
          preserve_case: true
        - name: 'LOCATION'
          label: 'Location'
          type: 'String:32'
          help_text: 'State, province, county or DX'
        - name: 'NAME'
          label: 'Name'
          type: 'String:75'
          preserve_case: true
        - name: 'ADDRESS'
          label: 'Address'
          type: 'String:45'
          widget: 'textarea'
          max_lines: 6
          preserve_case: true
        - name: 'SOAPBOX'
          label: 'Soapbox'
          type: 'String:75'
          widget: 'textarea'
          required: false
          preserve_case: true
    define:
      - name: 'DX'
        values:
          - DX
      - name: 'Counties'
        values:
          - ABBE
          - AIKE
          - ALLE
          - ANDE
          - BAMB
          - BARN
          - BEAU
          - BERK
          - CHOU
          - CHAR
          - CHES
          - CHFD
          - CKEE
          - CLRN
          - COLL
          - DARL
          - DILL
          - DORC
          - EDGE
          - FAIR
          - FLOR
          - GEOR
          - GRWD
          - GVIL
          - HAMP
          - HORR
          - JASP
          - KERS
          - LAUR
          - LEE
          - LEXI
          - LNCS
          - MARI
          - MARL
          - MCOR
          - NEWB
          - OCON
          - ORNG
          - PICK
          - RICH
          - SALU
          - SPAR
          - SUMT
          - UNIO
          - WILL
          - YORK
      - name: 'States'
        values:
          - AL
          - AK
          - AZ
          - AR
          - CA
          - CO
          - CT
          - DE
          - FL
          - GA
          - HI
          - ID
          - IL
          - IN
          - IA
