          - WCF
          - WTX
          - WV
          - WMA
          - WNY
          - WPA
          - WWA
          - WI
          - WY
    log_params:
      - name: 'Class'
        label: 'Class'
        type: 'String:3'
        required: true
        regex: '^\d+[A-F]$'
      - name: 'Section'
        label: 'Section'
        type: 'String:3'
        required: true
        in_sets: ['Sections']
      - name: 'Power Multiplier'
        label: 'Power Multiplier'
        type: 'Numeric:1'
        required: true
        default: '1'
        widget: 'select'
        valid_values: ['1', '2', '5']
    exchange:
      - name: 'Class(s)'
        type: 'String:3'
        adif: 'STX_STRING'
        fixed: true
        source_param: 'Class'
        regex: '^\d+[A-F]$'
        is_sent: true
      - name: 'Section(s)'
        type: 'String:3'
        adif: 'MY_ARRL_SECT'
        fixed: true
        source_param: 'Section'
        is_sent: true
        in_sets: ['Sections', 'DX']
      - name: 'Class'
        type: 'String:3'
        adif: 'SRX_STRING'
        regex: '^\d+[A-F]$'
        is_sent: false
      - name: 'Section'
        type: 'String:3'
        adif: 'ARRL_SECT'
        is_sent: false
        in_sets: ['Sections', 'DX']
    qso_columns:
      - 'Class'
      - 'Section'
      - 'Pts'
      - 'Op'
    qso_column_fields:
      Freq: 'FREQ'
      Mode: 'MODE'
      Call: 'CALL'
      Op: 'OPERATOR'
      'Class(s)': 'STX_STRING'
      'Section(s)': 'MY_ARRL_SECT'
      Class: 'SRX_STRING'
      Section: 'ARRL_SECT'
