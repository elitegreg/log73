contests:
  - id: 'ARRL-FD'
    display_name: 'ARRL Field Day'
    allowed_bands: [160, 80, 40, 20, 15, 10, 6, 2]
    allowed_modes: ['SSB', 'FM', 'CW']
    scoring:
      qso_points:
        rules:
          - when:
              field: 'MODE'
              values: ['SSB', 'FM']
            points: 1
          - points: 2
      dupe_key:
        - 'CALL'
        - 'BAND'
        - 'MODE'
      power_multiplier_param: 'Power Multiplier'
    define:
      - name: 'DX'
        values:
          - DX
      - name: 'Sections'
        values:
          - AL
          - AK
          - AB
          - AR
          - AZ
          - BC
          - CO
          - CT
          - DE
          - EB
          - EMA
          - ENY
