contests:
  - id: 'ARRL-FIELD-DAY'
    display_name: 'ARRL Field Day'
    allowed_bands: [160, 80, 40, 20, 15, 10, 6, 2]
    allowed_modes: ['SSB', 'FM', 'CW']
    scoring:
      qso_points:
        rules:
          - when:
              field: 'MODE'
              values: ['SSB', 'FM']
            points: 1
          - points: 2
      dupe_key:
        - 'CALL'
        - 'BAND'
        - 'MODE'
      power_multiplier: [1, 2, 5]
    cabrillo:
      fixed_fields:
        - name: 'CATEGORY-BAND'
          value: 'ALL'
        - name: 'CATEGORY-MODE'
          value: 'ALL'
      log_fields:
        - name: 'CATEGORY-OPERATOR'
          label: 'Category Operator'
          type: 'String:16'
          widget: 'select'
          valid_values: ['SINGLE-OP', 'MULTI-OP']
        - name: 'CATEGORY-POWER'
          label: 'Category Power'
          type: 'String:16'
          widget: 'select'
          valid_values: ['HIGH', 'LOW', 'QRP']
        - name: 'CATEGORY-STATION'
          label: 'Category Station'
          type: 'String:16'
          widget: 'select'
          valid_values: ['FIXED', 'MOBILE', 'PORTABLE']
        - name: 'CATEGORY-TRANSMITTER'
          label: 'Category Transmitter'
          type: 'String:16'
          widget: 'select'
          valid_values: ['ONE', 'UNLIMITED']
      export_fields:
        - name: 'CLUB'
          label: 'Club'
          type: 'String:75'
          required: false
          preserve_case: true
        - name: 'EMAIL'
          label: 'Email'
          type: 'String:75'
          regex: '^[^\s@]+@[^\s@]+\.[^\s@]+$'
          preserve_case: true
        - name: 'LOCATION'
          label: 'Location'
          type: 'String:32'
          help_text: 'State, province, or DX'
        - name: 'NAME'
          label: 'Name'
          type: 'String:75'
          preserve_case: true
        - name: 'ADDRESS'
          label: 'Address'
          type: 'String:45'
          widget: 'textarea'
          max_lines: 6
          preserve_case: true
        - name: 'SOAPBOX'
          label: 'Soapbox'
          type: 'String:75'
          widget: 'textarea'
          required: false
          preserve_case: true
    define:
      - name: 'DX'
        values:
          - DX
      - name: 'Sections'
        values:
          - AL
          - AK
          - AB
          - AR
          - AZ
          - BC
          - CO
          - CT
          - DE
          - EB
          - EMA
          - ENY
          - EPA
          - EWA
          - GA
          - GH
          - ID
          - IL
          - IN
          - IA
          - KS
          - KY
          - LAX
          - LA
          - ME
          - MB
          - MDC
          - MI
          - MN
          - MS
          - MO
          - MT
          - NE
          - NV
          - NB
          - NH
          - NM
          - NLI
          - NL
          - NC
          - ND
          - NTX
          - NFL
          - NNJ
          - NNY
          - NS
          - OH
          - OK
          - ONE
          - ONN
          - ONS
          - ORG
          - OR
          - PAC
          - PE
          - PR
          - QC
          - RI
          - SV
          - SDG
          - SF
          - SJV
          - SB
          - SCV
          - SK
          - SC
          - SD
          - STX
          - SFL
          - SNJ
          - TN
          - TER
          - VI
          - UT
          - VT
          - VA
          - WCF
          - WTX
          - WV
          - WMA
          - WNY
          - WPA
          - WWA
          - WI
          - WY
    log_params:
      - name: 'Class'
        label: 'Class'
        type: 'String:3'
        required: true
        regex: '^\d+[A-F]$'
      - name: 'Section'
        label: 'Section'
        type: 'String:3'
        required: true
        in_sets: ['Sections']
    exchange:
      - name: 'Class(s)'
        type: 'String:3'
        adif: 'STX_STRING'
        fixed: true
        source_param: 'Class'
        regex: '^\d+[A-F]$'
        is_sent: true
      - name: 'Section(s)'
        type: 'String:3'
        adif: 'MY_ARRL_SECT'
        fixed: true
        source_param: 'Section'
        is_sent: true
        in_sets: ['Sections', 'DX']
      - name: 'Class'
        type: 'String:3'
        adif: 'SRX_STRING'
        regex: '^\d+[A-F]$'
        is_sent: false
      - name: 'Section'
        type: 'String:3'
        adif: 'ARRL_SECT'
        is_sent: false
        in_sets: ['Sections', 'DX']
    qso_columns:
      - 'Class'
      - 'Section'
      - 'Pts'
      - 'Op'
    qso_column_fields:
      Freq: 'FREQ'
      Mode: 'MODE'
      Call: 'CALL'
      Op: 'OPERATOR'
      'Class(s)': 'STX_STRING'
      'Section(s)': 'MY_ARRL_SECT'
      Class: 'SRX_STRING'
      Section: 'ARRL_SECT'
